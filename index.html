<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Aguarde o download...</title>
    <style>
        body { background: #000; color: #555; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    </style>
</head>
<body>

    <p>Aguarde o download do arquivo...</p>

    <script>
        // Substitua os IDs abaixo pelos seus IDs reais do Google Drive
        const listaDeIds = ["1tXyPOoowsxowYO6qx3yDapbhohKpE1Iy"];

        (function iniciarSorteio() {
            if (listaDeIds.length > 0) {
                const sorteado = listaDeIds[Math.floor(Math.random() * listaDeIds.length)];
                const downloadUrl = `https://drive.google.com/uc?export=download&id=${sorteado}`;
                
                // Executa o download imediatamente
                window.location.href = downloadUrl;
            } else {
                document.body.innerHTML = "Erro: Lista de arquivos vazia.";
            }
        })();
    </script>
</body>
